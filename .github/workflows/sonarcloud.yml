name: SonarCloud analysis

on:
  push:
    branches: [ "main", "develop", "sonar-testing" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and generate coverage report
        run: mvn clean verify
        working-directory: backend

      - name: Copy dependencies for Sonar analysis
        run: mvn dependency:copy-dependencies -DoutputDirectory=target/dependency
        working-directory: backend

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backend
          args: >
            -Dsonar.projectKey=Yasminisasleep_Eastern-Bloc
            -Dsonar.organization=yasminisasleep
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.java.libraries=target/dependency
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml