services:
  postgres:
    image: postgres:16.4-alpine
    container_name: kulto-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-kulto}
      POSTGRES_USER: ${DB_USER:-kulto}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kulto}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kulto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kulto-net

  # Kafka in KRaft mode (no Zookeeper) — Kafka 3.x native
  kafka:
    image: bitnami/kafka:3.7.1
    container_name: kulto-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft settings
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - kulto-net

  backend:
    # Pinned release image — fall back to local build if not yet pulled
    image: ${BACKEND_IMAGE:-ghcr.io/yasminisasleep/kulto-backend:1.0.0}
    container_name: kulto-backend
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: on-failure
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-kulto}
      DB_USER: ${DB_USER:-kulto}
      DB_PASSWORD: ${DB_PASSWORD:-kulto}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      JWT_SECRET: ${JWT_SECRET:-ThisIsAVeryLongSecretKeyForJWTSigningPurposesOnlyDoNotUseInProduction}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SERVER_PORT: ${SERVER_PORT:-8080}
      TICKETMASTER_ENABLED: ${TICKETMASTER_ENABLED:-false}
      TICKETMASTER_API_KEY: ${TICKETMASTER_API_KEY:-}
    networks:
      - kulto-net

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/yasminisasleep/kulto-frontend:1.0.0}
    container_name: kulto-frontend
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/api
    networks:
      - kulto-net

volumes:
  pgdata:
  kafka-data:

networks:
  kulto-net:
    driver: bridge

