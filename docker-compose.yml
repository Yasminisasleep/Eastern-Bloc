services:
  postgres:
    image: postgres:16
    container_name: kulto-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-kulto}
      POSTGRES_USER: ${DB_USER:-kulto}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kulto}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kulto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kulto-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: kulto-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - kulto-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kulto-kafka
    ports:
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CREATE_TOPICS: "events.ingestion:1:1,user.preferences.updated:1:1,match.notifications:1:1"
    networks:
      - kulto-net

  backend:
    container_name: kulto-backend
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-kulto}
      DB_USER: ${DB_USER:-kulto}
      DB_PASSWORD: ${DB_PASSWORD:-kulto}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      JWT_SECRET: ${JWT_SECRET:-ThisIsAVeryLongSecretKeyForJWTSigningPurposesOnlyDoNotUseInProduction}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SERVER_PORT: ${SERVER_PORT:-8080}
      TICKETMASTER_ENABLED: ${TICKETMASTER_ENABLED:-false}
      TICKETMASTER_API_KEY: ${TICKETMASTER_API_KEY:-}
    networks:
      - kulto-net

  frontend:
    container_name: kulto-frontend
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/api
    networks:
      - kulto-net

volumes:
  pgdata:

networks:
  kulto-net:
    driver: bridge

